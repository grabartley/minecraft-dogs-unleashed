name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - stable
        default: alpha

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck --configuration-cache --build-cache

      - name: Run tests with coverage
        run: ./gradlew check --configuration-cache --build-cache

      - name: Dedicated server smoke boot
        run: timeout 120s ./gradlew runServer --no-daemon --stacktrace --args="nogui" || test $? -eq 124

      - name: Run game tests
        run: ./gradlew runGametestServer --no-daemon --stacktrace
        continue-on-error: true
        timeout-minutes: 10

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Publish game test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/gametest-results.xml"
          detailed_summary: true
          include_passed: true
          check_name: Game Test Report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      # ---------- Non-release builds (PR + push to main) ----------
      - name: Build snapshot JAR
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: ./gradlew build -Pversion=1.0.0-SNAPSHOT-${{ github.sha }}

      - name: Upload snapshot JAR
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dogs-unleashed-${{ github.sha }}
          path: build/libs/*.jar

      # ---------- Release-only (manual trigger) ----------
      - name: Compute next version
        if: github.event_name == 'workflow_dispatch'
        id: semver
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match='v*' 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Previous: ${LATEST_VERSION}"
          echo "New:      ${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Map release type to Modrinth version type
        if: github.event_name == 'workflow_dispatch'
        id: release_meta
        run: |
          case "${{ inputs.release_type }}" in
            stable) echo "modrinth_type=release" >> $GITHUB_OUTPUT ;;
            beta)   echo "modrinth_type=beta"    >> $GITHUB_OUTPUT ;;
            alpha)  echo "modrinth_type=alpha"   >> $GITHUB_OUTPUT ;;
          esac

      - name: Build release JAR
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew build -Pversion=${{ steps.semver.outputs.new_version }}

      - name: Generate changelog
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=v${{ steps.semver.outputs.new_version }} \
            --jq .body > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::Generated changelog is empty"
            echo "No changes recorded for this release." > release-notes.md
          fi

          echo "--- Changelog ---"
          cat release-notes.md

      - name: Create GitHub tag
        if: github.event_name == 'workflow_dispatch'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.semver.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.new_version }}
          files: build/libs/*.jar
          body_path: release-notes.md
          prerelease: ${{ inputs.release_type != 'stable' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Modrinth
        if: github.event_name == 'workflow_dispatch'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: dogs-unleashed
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/*.jar
          name: Dogs Unleashed v${{ steps.semver.outputs.new_version }}
          version: ${{ steps.semver.outputs.new_version }}
          version-type: ${{ steps.release_meta.outputs.modrinth_type }}
          loaders: fabric
          game-versions: 1.21.1
          changelog-file: release-notes.md